on: push

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        # os: [ubuntu-latest, windows-latest]

    steps:
      # Step 1: Check out Git repository
      - name: Check out Git repository
        uses: actions/checkout@v2  

      # Step 2: Install Node.js, NPM, and Yarn
      - name: Install Node.js, NPM, and Yarn
        uses: actions/setup-node@v3  
        with:
          node-version: 18

      # Step 3: Build/release Electron app
      - name: Electron-builder compiler action
        uses: x6pnda/action-electron-compiler@v1.0.1
        with:
            # GitHub token, automatically provided to the action
            # (Optional)
            github_token: ${{ secrets.github_token }}

            # If the commit is tagged with a version (e.g. "v1.0.0"),
            # (Optional)
            release: ${{ startsWith(github.ref, 'refs/tags/v') }}

            # Package manager. NPM, PNPM and Yarn supported. Install Yarn and PNPM yourself. Default is NPM
            # (Optional)
            package_manager: NPM

            # Skip buiding the application
            # (Optional)
            skip_build: false

            package_root: ./application

      # Step 4: Install dependencies
      - name: Install dependencies
        working-directory: ./application
        run: npm install

      # Step 5: Run formatting and linting
      - name: Run formatting and linting
        working-directory: ./application
        run: npm run check

      # Step 6: Run Jest tests
      - name: Run Jest tests
        working-directory: ./application
        run: npm test

      # Step 7: Run SonarQube scan
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v1
        with:
          projectBaseDir: ./application
        env:
          # Set the SonarQube token and host URL
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "http://localhost:9000"